name: Actualizar datos Vilcanota

on:
  workflow_dispatch:
  schedule:
    - cron: "37 11 * * *"
      timezone: "America/Lima"

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy xarray pyarrow pyshp google-api-python-client google-auth google-auth-httplib2 h5netcdf h5py scipy pyreadr

      - name: Ejecutar actualización
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_DIR: ${{ secrets.FTP_DIR }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_JSON: ${{ secrets.GOOGLE_SERVICE_JSON }}
          SHP_PATH: shape/Estacion.shp
        run: |
          python scripts/update_vilcanota_data.py
